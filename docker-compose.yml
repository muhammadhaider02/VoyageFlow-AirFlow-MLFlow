# ============================================================
# TitanFlow-AirFlow-MLFlow — Docker Compose
# Apache Airflow 2.8 + MLflow 2.x running locally
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # MLflow tracking server (running as separate service)
    MLFLOW_TRACKING_URI: http://mlflow:5000
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      mlflow==2.11.1
      scikit-learn==1.4.1.post1
      pandas==2.2.1
      numpy==1.26.4
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
    - ${AIRFLOW_PROJ_DIR:-.}/mlruns:/opt/airflow/mlruns
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL metadata DB for Airflow ──────────────────
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── MLflow Tracking Server ───────────────────────────────
  mlflow:
    image: python:3.11-slim
    # IMPORTANT: use list format — folded YAML strings split args across
    # lines causing bash to treat --host, --port etc. as separate commands,
    # which made mlflow bind to 127.0.0.1 (inaccessible from other containers).
    command:
      - bash
      - -c
      - "pip install mlflow==2.11.1 && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns --artifacts-destination /mlruns --serve-artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/mlruns:/mlruns
    healthcheck:
      # python:3.11-slim has no curl — use python's built-in urllib instead
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: always

  # ── Airflow Web Server ───────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy

  # ── Airflow Scheduler ────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy

  # ── Airflow Initializer (runs once) ─────────────────────
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow

volumes:
  postgres-db-volume:
